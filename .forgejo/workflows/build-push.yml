name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Triggers on pushes to the main branch
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: 

jobs:
  docker-build-push:
    runs-on: ubuntu-latest # Make sure your Forgejo instance has a runner with this label

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          # Change this to your registry (e.g., ghcr.io, docker.io, or your Forgejo registry)
          registry: forgejo.trippt.xyz 
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Define the final image name here
          images: forgejo.trippt.xyz/${{ github.repository }}:latest 

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max